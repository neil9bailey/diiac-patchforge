name: PatchForge CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-contracts-runtime:
    name: Python contracts and runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Python tests
        run: python -m pytest -q --basetemp .pytest_tmp

  backend-api:
    name: Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend-api/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-api ci

      - name: Check backend syntax
        run: node --check backend-api/server.js

      - name: Run backend tests
        run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  collector:
    name: Windows collector checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check collector syntax
        run: node --check collector/patchforge-collector.mjs

      - name: Run collector tests
        run: npm run collector:test

      - name: Parse collector PowerShell helpers
        shell: powershell
        run: |
          $errors = @()
          Get-ChildItem scripts -Filter "*patchforge_collector*.ps1" | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors)
            $errors += $parseErrors
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

  iac:
    name: Bicep IaC build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Bicep template
        run: az bicep build --file infra/bicep/main.bicep

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs:
      - python-contracts-runtime
      - backend-api
      - frontend
      - collector
      - iac
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: patchforge-frontend
            context: Frontend
            dockerfile: Frontend/Dockerfile
          - name: patchforge-bridge
            context: backend-api
            dockerfile: backend-api/Dockerfile
          - name: patchforge-runtime
            context: .
            dockerfile: runtime/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f ${{ matrix.dockerfile }} -t diiac/${{ matrix.name }}:ci ${{ matrix.context }}
