name: PatchForge CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-contracts-runtime:
    name: Python contracts and runtime
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Python tests
        run: python -m pytest -q --basetemp .pytest_tmp

      - name: Audit Python dependencies
        run: |
          pip-audit -r requirements-dev.txt
          pip-audit -r requirements-runtime.txt

  backend-api:
    name: Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend-api/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend-api ci

      - name: Check backend syntax
        run: node --check backend-api/server.js

      - name: Run backend tests
        run: npm test

      - name: Audit backend dependencies
        run: npm --prefix backend-api audit --audit-level=high

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run frontend browser accessibility journey
        run: npm run test:e2e

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  collector:
    name: Windows collector checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Check collector syntax
        run: node --check collector/patchforge-collector.mjs

      - name: Run collector tests
        run: npm run collector:test

      - name: Run collector lifecycle checks
        shell: powershell
        run: ./scripts/test_patchforge_collector_windows_lifecycle.ps1

      - name: Build and verify unsigned CI collector package
        shell: powershell
        run: |
          ./scripts/build_patchforge_collector_windows_exe.ps1 -OutputDirectory "artifacts\collector\ci-windows"
          ./scripts/verify_patchforge_collector_windows_package.ps1 `
            -CollectorExePath "artifacts\collector\ci-windows\patchforge-collector.exe" `
            -ManifestPath "artifacts\collector\ci-windows\collector-package-manifest.json" `
            -AllowUnsignedDevelopmentPackage | Out-Null

      - name: Parse collector PowerShell helpers
        shell: powershell
        run: |
          $errors = @()
          Get-ChildItem scripts -Filter "*patchforge_collector*.ps1" | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors)
            $errors += $parseErrors
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Parse and guard production release helper
        shell: powershell
        run: |
          $releaseScript = "scripts/publish_patchforge_production.ps1"
          $tokens = $null
          $parseErrors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path $releaseScript),
            [ref]$tokens,
            [ref]$parseErrors
          )
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          $text = Get-Content -Raw -LiteralPath $releaseScript
          if ($text -match 'catch\s*\{[\s\S]*?Write-Error') {
            throw "Release catch blocks must not call Write-Error while ErrorActionPreference=Stop; rollback must remain reachable."
          }

  iac:
    name: Bicep IaC build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Build Bicep template
        run: az bicep build --file infra/bicep/main.bicep

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs:
      - python-contracts-runtime
      - backend-api
      - frontend
      - collector
      - iac
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: patchforge-frontend
            context: Frontend
            dockerfile: Frontend/Dockerfile
          - name: patchforge-bridge
            context: backend-api
            dockerfile: backend-api/Dockerfile
          - name: patchforge-runtime
            context: .
            dockerfile: runtime/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Build image
        run: docker build -f ${{ matrix.dockerfile }} -t diiac/${{ matrix.name }}:ci ${{ matrix.context }}

      - name: Scan image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: diiac/${{ matrix.name }}:ci
          scanners: vuln,secret
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          timeout: 15m

      - name: Generate image SPDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: diiac/${{ matrix.name }}:ci
          scanners: vuln
          format: spdx-json
          output: ${{ matrix.name }}.spdx.json
          exit-code: "0"
          skip-setup-trivy: true
          timeout: 15m

      - name: Upload image SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}-sbom-${{ github.sha }}
          path: ${{ matrix.name }}.spdx.json
          if-no-files-found: error
          retention-days: 90
