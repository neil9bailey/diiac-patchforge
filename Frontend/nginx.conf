server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Cache-Control "no-store";
  add_header X-Content-Type-Options "nosniff";
  add_header X-Frame-Options "DENY";

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
  }
}

